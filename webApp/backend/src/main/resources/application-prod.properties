# Production Environment Configuration (AWS)

# MariaDB Database Configuration (AWS RDS)
# TODO: AWS RDS 엔드포인트로 변경 필요
spring.datasource.url=jdbc:mariadb://your-rds-endpoint.region.rds.amazonaws.com:3306/portfolio_prod
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD}

# JPA Configuration (Production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# CORS Configuration (Production)
# TODO: 실제 프로덕션 도메인으로 변경 필요
cors.allowed-origins=https://yourdomain.com

# Logging
logging.level.root=INFO
logging.level.com.portfolio=INFO
logging.level.org.springframework.security=WARN

# ============================================
# Security Configuration (Production)
# ============================================
# 관리자 계정 설정 - 환경 변수 사용 (필수!)
# 절대 하드코딩하지 마세요!
# AWS에서 설정 방법:
# - Elastic Beanstalk: 환경 속성에서 설정
# - EC2: 시스템 환경 변수로 설정
# - Docker: -e 옵션으로 전달
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
