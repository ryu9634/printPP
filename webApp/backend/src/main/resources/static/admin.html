<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - Portfolio Admin</title>
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <div class="admin-app">
        <!-- 헤더 -->
        <header class="admin-header">
            <h1>포트폴리오 관리자</h1>
            <a href="index.html" class="btn-view-site">사이트 보기</a>
        </header>

        <div class="admin-container">
            <!-- 사이드바 -->
            <aside class="admin-sidebar">
                <nav class="admin-nav">
                    <button class="nav-btn active" data-section="categories">카테고리 관리</button>
                    <button class="nav-btn" data-section="posts">게시글 관리</button>
                </nav>
            </aside>

            <!-- 메인 콘텐츠 -->
            <main class="admin-content">
                <!-- 카테고리 관리 섹션 -->
                <section id="categories-section" class="admin-section active">
                    <div class="section-header">
                        <h2>카테고리 관리</h2>
                        <button class="btn btn-primary" onclick="showAddCategoryModal()">+ 새 카테고리</button>
                    </div>

                    <div class="categories-list">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>카테고리명</th>
                                    <th>타입</th>
                                    <th>동작</th>
                                </tr>
                            </thead>
                            <tbody id="categories-tbody">
                                <!-- 카테고리 목록이 여기에 표시됩니다 -->
                            </tbody>
                        </table>
                    </div>
                </section>

                <!-- 게시글 관리 섹션 -->
                <section id="posts-section" class="admin-section">
                    <div class="section-header">
                        <h2>게시글 관리</h2>
                        <div class="section-controls">
                            <select id="category-filter" class="category-select">
                                <option value="">카테고리 선택</option>
                            </select>
                            <button class="btn btn-primary" onclick="showAddPostModal()">+ 새 게시글</button>
                        </div>
                    </div>

                    <div class="posts-list">
                        <div id="posts-grid" class="posts-grid">
                            <!-- 게시글 목록이 여기에 표시됩니다 -->
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- 카테고리 추가 모달 -->
    <div id="category-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>새 카테고리 추가</h3>
                <span class="close" onclick="closeModal('category-modal')">&times;</span>
            </div>
            <form id="category-form" onsubmit="handleAddCategory(event)">
                <div class="form-group">
                    <label for="category-id">카테고리 ID (영문, 소문자)</label>
                    <input type="text" id="category-id" required pattern="[a-z0-9-]+"
                           placeholder="예: new-category">
                </div>
                <div class="form-group">
                    <label for="category-name">카테고리 이름</label>
                    <input type="text" id="category-name" required
                           placeholder="예: New Category">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('category-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">추가</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 게시글 추가/수정 모달 -->
    <div id="post-modal" class="modal">
        <div class="modal-content large">
            <div class="modal-header">
                <h3 id="post-modal-title">새 게시글 추가</h3>
                <span class="close" onclick="closeModal('post-modal')">&times;</span>
            </div>
            <form id="post-form" onsubmit="handleSavePost(event)">
                <input type="hidden" id="post-id">
                <input type="hidden" id="post-category-id">

                <div class="form-group">
                    <label for="post-category">카테고리</label>
                    <select id="post-category" required>
                        <option value="">선택하세요</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="post-title">제목</label>
                    <input type="text" id="post-title" required placeholder="작품 제목">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="post-year">연도</label>
                        <input type="text" id="post-year" required placeholder="2024">
                    </div>
                    <div class="form-group">
                        <label for="post-medium">매체</label>
                        <input type="text" id="post-medium" required placeholder="캔버스에 아크릴">
                    </div>
                    <div class="form-group">
                        <label for="post-size">크기</label>
                        <input type="text" id="post-size" required placeholder="100x80cm">
                    </div>
                </div>

                <div class="form-group">
                    <label for="post-thumbnail">썸네일 이미지</label>
                    <input type="text" id="post-thumbnail" placeholder="파일명" readonly>
                    <small>아래 파일 선택 버튼을 사용하여 이미지를 업로드하세요</small>
                </div>

                <div class="form-group">
                    <label for="post-description">설명</label>
                    <textarea id="post-description" rows="4" placeholder="작품에 대한 설명..."></textarea>
                </div>

                <div class="form-group">
                    <label>추가 이미지 URL</label>
                    <div id="additional-images">
                        <!-- 추가 이미지 입력 필드가 여기에 표시됩니다 -->
                    </div>
                    <button type="button" class="btn btn-secondary btn-sm" onclick="addImageInput()">+ 이미지 추가</button>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('post-modal')">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="scripts/admin.js"></script>
</body>
</html>
