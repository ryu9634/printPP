# Local Development Environment Configuration

# MariaDB Database Configuration (Local)
spring.datasource.url=jdbc:mariadb://localhost:3306/portfolio_dev
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration (Local)
cors.allowed-origins=http://localhost:3000,http://localhost:8000,http://127.0.0.1:8000
