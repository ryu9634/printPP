# ============================================
# Portfolio Application Configuration
# ============================================

# ============================================
# Active Profile Configuration
# ============================================
# 사용 가능한 프로파일:
# - local: 로컬 개발 환경 (MariaDB localhost)
# - prod: AWS 프로덕션 환경 (RDS)
#
# 프로파일 변경 방법:
# - IDE: Run Configuration에서 -Dspring.profiles.active=local 설정
# - Command Line: java -jar -Dspring.profiles.active=prod app.jar
spring.profiles.active=local

# ============================================
# Server Configuration
# ============================================
server.port=8080
# 컨텍스트 경로 (기본값: /)
# server.servlet.context-path=/api

# ============================================
# Application Information
# ============================================
spring.application.name=Portfolio Management System

# ============================================
# JPA Common Configuration
# ============================================
# MariaDB 방언 설정
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# OSIV(Open Session In View) 비활성화 - 성능 최적화
# 뷰 렌더링 시 영속성 컨텍스트를 유지하지 않음 (REST API에 권장)
spring.jpa.open-in-view=false

# ============================================
# File Upload Configuration
# ============================================
# 파일 업로드 활성화
spring.servlet.multipart.enabled=true

# 단일 파일 최대 크기 (기본: 10MB)
spring.servlet.multipart.max-file-size=10MB

# 전체 요청 최대 크기 (기본: 10MB)
spring.servlet.multipart.max-request-size=10MB

# 임시 파일 저장 위치 (선택 사항)
# spring.servlet.multipart.location=/tmp

# ============================================
# File Storage Configuration
# ============================================
# 업로드된 파일 저장 경로
# - 상대 경로: ./uploads (애플리케이션 실행 위치 기준)
# - 절대 경로: /var/portfolio/uploads (프로덕션 권장)
file.upload-dir=./uploads

# ============================================
# Logging Configuration
# ============================================
# 로그 레벨 설정
logging.level.root=INFO
logging.level.com.portfolio=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO

# 로그 패턴 (선택 사항)
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# Security Configuration
# ============================================
# 관리자 계정 설정
# 주의: 프로덕션에서는 반드시 환경 변수로 설정하세요!
# 예: -Dadmin.username=myuser -Dadmin.password=mypassword
admin.username=admin
admin.password=admin123
