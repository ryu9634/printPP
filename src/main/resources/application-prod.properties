# Production Environment Configuration (AWS)

# Server Configuration
server.port=8080

# MariaDB Database Configuration (EC2 Local)
spring.datasource.url=jdbc:mariadb://localhost:3306/portfolio_prod?createDatabaseIfNotExist=true
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME:portfolio}
spring.datasource.password=${DB_PASSWORD}

# JPA Configuration (Production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# CORS Configuration (Production)
cors.allowed-origins=https://yourdomain.com

# Static Resources Configuration
spring.web.resources.static-locations=file:/opt/portfolio/static/,classpath:/static/

# File Upload Path (Production)
file.upload-dir=/opt/portfolio/uploads

# Logging
logging.level.root=INFO
logging.level.com.portfolio=INFO
logging.level.org.springframework.security=WARN

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Security Configuration (Production)
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
