# ============================================
# Local Development Environment Configuration
# ============================================

# ============================================
# MariaDB Database Configuration (Local)
# ============================================
# 로컬 MariaDB 서버 연결 설정
spring.datasource.url=jdbc:mariadb://localhost:3306/portfolio_dev?createDatabaseIfNotExist=true
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=1234

# 커넥션 풀 설정 (HikariCP - Spring Boot 기본값)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA Configuration (Development)
# ============================================
# DDL 자동 생성 모드
# - create: 기존 테이블 삭제 후 재생성 (데이터 손실 주의!)
# - create-drop: create + 애플리케이션 종료 시 테이블 삭제
# - update: 변경사항만 반영 (개발 환경 권장)
# - validate: 스키마 검증만 수행
# - none: 아무것도 하지 않음
spring.jpa.hibernate.ddl-auto=update

# SQL 쿼리 콘솔 출력 (디버깅용)
spring.jpa.show-sql=true

# SQL 포맷팅 (가독성 향상)
spring.jpa.properties.hibernate.format_sql=true

# SQL 주석 표시
spring.jpa.properties.hibernate.use_sql_comments=true

# ============================================
# CORS Configuration (Local Development)
# ============================================
# 로컬 개발 시 허용할 도메인
# 프론트엔드 개발 서버, Live Server 등
cors.allowed-origins=http://localhost:3000,http://localhost:8000,http://127.0.0.1:8000,http://127.0.0.1:5500
